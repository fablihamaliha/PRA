# CI/CD Pipeline - Continuous Integration
name: CI - Build & Test

on:
  push:
    branches: [ master, main]
    paths-ignore:
       - '**/*.md'
       - 'docs/**'
  pull_request:
    branches: [ master, main ]
    paths-ignore:
       - '**/*.md'
       - 'docs/**'
  workflow_dispatch:

jobs:
  verify-owner:
    name: Verify Repository Owner
    runs-on: ubuntu-latest
    outputs:
      is-owner: ${{ steps.check.outputs.is-owner }}
    steps:
      - name: Check if repository owner
        id: check
        run: |
          if [ "${{ github.repository_owner }}" = "fablihamaliha" ]; then
            echo "is-owner=true" >> $GITHUB_OUTPUT
            echo "✅ Authorized: Repository owner verified"
          else
            echo "is-owner=false" >> $GITHUB_OUTPUT
            echo "❌ Unauthorized"
            exit 1
          fi

  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [verify-owner]
    if: needs.verify-owner.outputs.is-owner == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert repository name to lowercase
        id: repo_name
        run: echo "repo_lowercase=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.repo_name.outputs.repo_lowercase }}:latest
            ghcr.io/${{ steps.repo_name.outputs.repo_lowercase }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/arm64

      - name: Image built successfully
        run: |
          echo "✅ Docker image built and pushed"
          echo "Image: ghcr.io/${{ steps.repo_name.outputs.repo_lowercase }}:latest"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: verify-owner
    if: needs.verify-owner.outputs.is-owner == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
